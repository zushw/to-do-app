name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Backend Unit Tests
        env:
          DB_ENGINE: postgres
          DB_NAME: todo_db
          DB_USER: todo_user
          DB_PASSWORD: todo_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: "test-secret-key"
        run: |
          cd backend
          pytest 

      - name: Start Django Server (Background)
        env:
          DB_ENGINE: postgres
          DB_NAME: todo_db
          DB_USER: todo_user
          DB_PASSWORD: todo_password
          DB_HOST: localhost
          DB_PORT: 5432
          ALLOWED_HOSTS: "*"
        run: |
          cd backend
          python manage.py migrate
          python manage.py runserver &
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Start Frontend Server (Background)
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: |
          cd frontend
          npm run dev & 

      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:8000/api/v1/ --timeout 30000
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Selenium E2E Tests
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: |
          cd frontend
          npm test -- --runInBand